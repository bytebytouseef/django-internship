<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Admin</h2>
        <nav>
            <p>Dashboard</p>
            <p>Users</p>
            <p>Reports</p>
        </nav>
    </aside>

    <!-- Main Area -->
    <div class="main">

        <!-- Navbar -->
        <header class="navbar">
            <h3>Dashboard</h3>
        </header>

        <!-- Stats -->
        <section class="stats">
            <div class="card">Users: 120</div>
            <div class="card">Sales: 300</div>
            <div class="card">Revenue: $500</div>
        </section>

        <!-- Table -->
        <section class="table-section">
            <table>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Ali</td>
                    <td>Active</td>
                </tr>
                <tr>
                    <td>Ahmed</td>
                    <td>Inactive</td>
                </tr>
            </table>
        </section>

    </div>
</div>

</body>
</html>
